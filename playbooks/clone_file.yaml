- hosts: all
  become: true
  remote_user: yahia

  roles:
    - geerlingguy.docker

  tasks:
    - name: Ensure yahia is in docker group
      ansible.builtin.user:
        name: yahia
        groups: docker
        append: true

    - name: Configure UFW rules
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: [22, 80, 443]

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Install make
      ansible.builtin.apt:
        name: make
        state: present
        update_cache: yes

    - name: Remove existing cloud1_dev directory to fix permissions
      ansible.builtin.file:
        path: "/home/yahia/cloud1_dev"
        state: absent

    - name: Create cloud1_dev directory with proper ownership
      ansible.builtin.file:
        path: "/home/yahia/cloud1_dev"
        state: directory
        owner: yahia
        group: yahia

    - name: Sync cloud1_dev to server
      become: true
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/cloud-1_dev/"
        dest: "/home/yahia/cloud1_dev/"
        directory_mode: yes

    - name: Fix ownership of cloud1_dev
      ansible.builtin.file:
        path: "/home/yahia/cloud1_dev"
        owner: yahia
        group: yahia
        recurse: yes

    - name: Find shell scripts in cloud1_dev
      ansible.builtin.find:
        paths: "/home/yahia/cloud1_dev"
        patterns: "*.sh"
        file_type: file
        recurse: yes
      register: shell_scripts

    - name: Run make (as yahia)
      become: true
      ansible.builtin.command: make
      args:
        chdir: /home/yahia/cloud1_dev
      register: make_run
      retries: 3
      delay: 10
      until: make_run is succeeded
      timeout: 300

    - name: Wait for nginx/HTTPS to be reachable
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/"
        method: GET
        validate_certs: false
        status_code: [200, 301, 302]
      register: web
      retries: 30
      delay: 3
      until: web.status in [200, 301, 302]