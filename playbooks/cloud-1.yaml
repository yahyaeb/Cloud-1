- hosts: all
  remote_user: root
  roles:
    - geerlingguy.docker
    - site_dir
    - firewall_config
    - make_install
    - domain_config
    - run_make


  tasks:
    - name: Wait for nginx/HTTPS to be reachable
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/"
        method: GET
        validate_certs: false
        status_code: [200, 301, 302]
      register: web
      retries: 30
      delay: 3
      until: web.status in [200, 301, 302]